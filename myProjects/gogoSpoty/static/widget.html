<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://fonts.googleapis.com/css2?family=K2D:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="script.js"></script>
</head>
<body>
  <div class="player">
    <img class="cover" id="cover" src="" alt="Album cover">
    
    <div class="info">
      <h2 class="track-name" id="track-name">Track Name</h2>
      <p class="artist" id="artist">Artist</p>
      
      <div class="time-row">
        <span id="current-time">00:00</span>
        <span id="total-time">00:00</span>
      </div>
      
      <div class="progress-bar">
        <div class="progress" id="progress"></div>
      </div>
    </div>
  </div>
</body>
</html>
